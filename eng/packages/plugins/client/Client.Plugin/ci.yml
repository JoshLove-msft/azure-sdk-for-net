trigger:
  branches:
    include:
      - main
  paths:
    include:
      - eng/packages/plugins/client/Client.Plugin
      - eng/packages/http-client-csharp
pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
  paths:
    include:
      - eng/packages/plugins/client/Client.Plugin
      - eng/packages/http-client-csharp

variables:
  - template: /eng/pipelines/templates/variables/image.yml
  - template: /eng/pipelines/templates/variables/globals.yml

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    stages:
    - stage: Build
      displayName: 'Build'
      pool:
        name: $(LINUXPOOL)
        image: $(LINUXVMIMAGE)
        os: linux
      jobs:
      - job: Build
        steps:
        - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
          parameters:
            Paths:
              - "/sdk/core/Azure.Core/src/Shared"
        - template: /eng/pipelines/templates/steps/install-dotnet.yml
        - pwsh: |
            dotnet build .
          displayName: 'Build client plugin'
          workingDirectory: eng/packages/plugins/client/Client.Plugin
        - pwsh: |
            dotnet test . --no-build
          displayName: 'Test client plugin'
          workingDirectory: eng/packages/plugins/client/Client.Plugin
        - pwsh: |
            ./eng/scripts/CodeChecks.ps1 -BuildArtifactsPath $(Build.ArtifactStagingDirectory) -RepoRoot $(Build.SourcesDirectory) -CheckEmitterPackage $false
          displayName: 'Regenerate and verify no diff'
